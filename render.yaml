services:
  - type: web
    name: researcher-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn Frontend.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MISTRAL_API_KEY
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0
